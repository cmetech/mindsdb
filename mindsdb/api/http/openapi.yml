  # ===========================================================================
  # SQL QUERY ENDPOINT
  # ===========================================================================
  /sql/query:
    post:
      tags:
        - SQL Query
      summary: Execute SQL query
      description: |
        Execute a SQL query using the Kore SQL dialect.

        This is the most flexible way to interact with Kore. The SQL interface supports:

        ### Data Definition (DDL)
        ```sql
        -- Create a project
        CREATE DATABASE my_project;

        -- Connect a database
        CREATE DATABASE my_postgres
        WITH ENGINE = 'postgres',
        PARAMETERS = {
          "host": "localhost",
          "port": 5432,
          "database": "mydb",
          "user": "user",
          "password": "pass"
        };

        -- Train a model
        CREATE MODEL my_project.price_predictor
        FROM my_postgres (SELECT * FROM sales_data)
        PREDICT price;

        -- Create a view
        CREATE VIEW my_project.active_customers AS (
          SELECT * FROM my_postgres.customers WHERE status = 'active'
        );
        ```

        ### Data Query (DQL)
        ```sql
        -- Make predictions
        SELECT * FROM my_project.price_predictor
        WHERE category = 'electronics';

        -- Query external database
        SELECT * FROM my_postgres.orders
        WHERE created_at > '2024-01-01';

        -- Join model with database
        SELECT t.*, p.price_prediction
        FROM my_postgres.products t
        JOIN my_project.price_predictor p;
        ```

        ### Utility Commands
        ```sql
        SHOW DATABASES;
        SHOW MODELS;
        SHOW TABLES FROM my_postgres;
        DESCRIBE my_project.price_predictor;
        ```

        ### Model Operations
        ```sql
        RETRAIN my_project.price_predictor;

        FINETUNE my_project.price_predictor
        FROM my_postgres (SELECT * FROM new_sales_data);
        ```
      operationId: executeQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SQLQueryRequest'
            examples:
              showDatabases:
                summary: List databases
                value:
                  query: "SHOW DATABASES"
              showModels:
                summary: List models
                value:
                  query: "SHOW MODELS"
              predict:
                summary: Make predictions
                value:
                  query: "SELECT * FROM mindsdb.price_predictor WHERE category = 'electronics'"
              trainModel:
                summary: Train a model
                value:
                  query: |
                    CREATE MODEL mindsdb.churn_predictor
                    FROM my_postgres (SELECT * FROM customers)
                    PREDICT will_churn
      responses:
        '200':
          description: Query executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SQLQueryResponse'
              examples:
                tableResult:
                  summary: Table result
                  value:
                    type: "table"
                    column_names: ["name", "engine", "tables"]
                    data:
                      - ["my_postgres", "postgres", ["users", "orders"]]
                      - ["mindsdb", "mindsdb", ["models", "jobs"]]
                okResult:
                  summary: Success message
                  value:
                    type: "ok"
                    message: "Model training started"
        '400':
          description: SQL syntax error or invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "syntax_error"
                message: "Syntax error near 'SELEC' at position 0"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Query execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
