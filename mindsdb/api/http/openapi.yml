        Retrieve all ML models in a project.

        Returns model names, status, target columns, and training metadata.

        ### Example Response
        ```json
        [
          {
            "name": "price_predictor",
            "status": "complete",
            "predict": "price",
            "engine": "lightwood",
            "accuracy": 0.94
          },
          {
            "name": "churn_model",
            "status": "training",
            "predict": "will_churn",
            "engine": "lightwood"
          }
        ]
        ```
      operationId: listModels
      parameters:
        - name: projectName
          in: path
          description: Project name
          required: true
          schema:
            type: string
          example: "mindsdb"
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Models
      summary: Create and train a model
      description: |
        Train a new ML model using data from a connected database.

        Model training is asynchronous - the endpoint returns immediately and
        training continues in the background. Check the model status to monitor progress.

        ### Example Request
        ```json
        {
          "name": "house_price_predictor",
          "predict": "price",
          "query": "SELECT bedrooms, sqft, location, price FROM real_estate.listings",
          "engine": "lightwood"
        }
        ```

        ### SQL Equivalent
        ```sql
        CREATE MODEL mindsdb.house_price_predictor
        FROM real_estate (
          SELECT bedrooms, sqft, location, price FROM listings
        )
        PREDICT price
        USING engine = 'lightwood';
        ```

        ### Training Status
        Check model status with `GET /projects/{project}/models/{model}`:
        - `generating` - Analyzing data and generating model configuration
        - `training` - Model is being trained
        - `complete` - Training finished successfully
        - `error` - Training failed (check error message)
      operationId: createModel
      parameters:
        - name: projectName
          in: path
          description: Project name
          required: true
          schema:
            type: string
          example: "mindsdb"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelCreate'
      responses:
        '200':
          description: Model training started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                status: "ok"
                message: "Model training started"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

