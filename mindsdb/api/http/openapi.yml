openapi: 3.0.3
info:
  title: Kore API - Knowledge Orchestration Reasoning Engine
  description: |
    # Overview

    Kore (Knowledge Orchestration Reasoning Engine) provides an AI/ML federated query engine
    with a SQL-like interface for predictive analytics, model training, and intelligent data analysis.

    ## Key Concepts

    ### Projects
    Projects are isolated namespaces for organizing models, agents, knowledge bases, and other resources.
    The default project is `mindsdb`. Projects are created/deleted via SQL queries, not REST API.

    ### Databases (Datasources)
    External data source connections (MySQL, PostgreSQL, MongoDB, etc.) that provide training data.
    Databases are **global** - they are not scoped to projects.

    ### Models
    ML models trained on data from connected databases. Models are project-scoped.

    ### Agents
    AI agents that can answer questions using models and knowledge bases.
    Agents support streaming completions via SSE (Server-Sent Events).

    ### Knowledge Bases
    Vector-based storage for unstructured data (documents, text) used by agents for RAG.

    ### Views
    Saved SQL queries that can be reused. Views are project-scoped.

    ### Skills
    Reusable agent capabilities and tool integrations.

    ### Jobs
    Scheduled tasks for model retraining, data sync, and automated workflows.

    ## SQL Query Interface

    Many operations can also be performed via the `/sql/query` endpoint using SQL syntax:

    ```sql
    -- Create a project
    CREATE DATABASE my_project;

    -- Create a database connection
    CREATE DATABASE my_postgres
    WITH ENGINE = 'postgres',
    PARAMETERS = {
      "host": "localhost",
      "port": 5432,
      "database": "mydb",
      "user": "user",
      "password": "pass"
    };

    -- Train a model
    CREATE MODEL my_project.price_predictor
    FROM my_postgres (SELECT * FROM sales_data)
    PREDICT price;

    -- Make predictions
    SELECT * FROM my_project.price_predictor
    WHERE category = 'electronics';
    ```

    ## Authentication

    All endpoints require authentication via API key in the `X-API-Key` header.
    When accessed via OSCAR middleware, authentication is handled automatically.

  version: 1.0.0
  contact:
    name: OSCAR Platform Support
    email: support@oscar.io
  license:
    name: Server Side Public License (SSPL v1)
    url: 'https://github.com/mindsdb/mindsdb/blob/main/LICENSE'

servers:
  - url: '/api/v1/kore'
    description: OSCAR Middleware Proxy (recommended)
  - url: 'http://localhost:47334/api'
    description: Direct Kore service access (development only)

tags:
  - name: Health
    description: Service health and configuration endpoints
  - name: Databases
    description: |
      Database/datasource connection management.

      **Important**: Databases are global in Kore - they are not scoped to projects.
      All projects can access all connected databases.
  - name: Projects
    description: |
      Project management. Projects are isolated namespaces for resources.

      **Note**: The REST API only supports listing and getting projects.
      To create or delete projects, use SQL queries:
      - `CREATE DATABASE project_name`
      - `DROP DATABASE project_name`
  - name: Models
    description: |
      ML model training and prediction.

      Models are project-scoped and trained on data from connected databases.
      Supported model types include regression, classification, time series, and more.
  - name: Agents
    description: |
      AI agents for conversational interfaces.

      Agents combine LLM capabilities with models and knowledge bases to answer questions.
      Supports streaming completions via SSE for real-time responses.
  - name: Knowledge Bases
    description: |
      Vector-based knowledge storage for RAG (Retrieval Augmented Generation).

      Store documents and text that agents can search to answer questions.
  - name: Views
    description: |
      Saved SQL queries for reuse.

      Views are virtual tables defined by SQL queries that can be referenced in other queries.
  - name: Skills
    description: |
      Reusable agent capabilities and tool integrations.

      Skills extend agent functionality with custom tools and data sources.
  - name: Jobs
    description: |
      Scheduled tasks and automated workflows.

      Schedule model retraining, data sync operations, and other recurring tasks.
  - name: SQL Query
    description: |
      Execute raw SQL queries.

      The query endpoint supports the full Kore SQL dialect including:
      - DDL: CREATE/DROP DATABASE, CREATE/DROP MODEL
      - DML: SELECT, INSERT, UPDATE, DELETE
      - Special: SHOW, DESCRIBE, RETRAIN

      This is the most flexible way to interact with Kore.

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication. Required for all endpoints.

  schemas:
    # =========================================================================
    # Common Schemas
    # =========================================================================
    ErrorResponse:
      type: object
      description: Standard error response
      properties:
        error:
          type: string
          description: Error type or code
          example: "not_found"
        message:
          type: string
          description: Human-readable error message
          example: "Database 'my_db' not found"
        detail:
          type: string
          description: Additional error details
      required:
        - message

    SuccessResponse:
      type: object
      description: Generic success response
      properties:
        status:
          type: string
          example: "ok"
        message:
          type: string

    # =========================================================================
    # Database Schemas
    # =========================================================================
    DatabaseConnection:
      type: object
      description: Database connection configuration
      properties:
        name:
          type: string
          description: Unique name for this database connection
          example: "my_postgres"
        engine:
          type: string
          description: |
            Database handler type. Common engines:
            - `postgres` - PostgreSQL
            - `mysql` - MySQL/MariaDB
            - `mongodb` - MongoDB
            - `snowflake` - Snowflake
            - `bigquery` - Google BigQuery
            - `s3` - Amazon S3 (CSV, Parquet, JSON files)
            - `elasticsearch` - Elasticsearch
            - `redis` - Redis
          example: "postgres"
        connection_data:
          type: object
          description: Connection parameters (varies by engine)
          properties:
            host:
              type: string
              description: Database host address
              example: "db.example.com"
            port:
              type: integer
              description: Database port
              example: 5432
            database:
              type: string
              description: Database name
              example: "production_db"
            user:
              type: string
              description: Username for authentication
              example: "readonly_user"
            password:
              type: string
              description: Password for authentication (will be masked in responses)
              example: "********"
          additionalProperties: true
      required:
        - name
        - engine
      example:
        name: "production_postgres"
        engine: "postgres"
        connection_data:
          host: "db.example.com"
          port: 5432
          database: "production"
          user: "analyst"
          password: "********"

    DatabaseInfo:
      type: object
      description: Database information response
      properties:
        name:
          type: string
          description: Database connection name
        engine:
          type: string
          description: Database handler type
        tables:
          type: array
          description: Available tables in this database
          items:
            type: string
        connection_data:
          type: object
          description: Connection parameters (passwords masked)
      example:
        name: "my_postgres"
        engine: "postgres"
        tables: ["users", "orders", "products"]
        connection_data:
          host: "localhost"
          port: 5432
          database: "mydb"
          user: "analyst"
          password: "********"

    # =========================================================================
    # Project Schemas
    # =========================================================================
    Project:
      type: object
      description: Project information
      properties:
        name:
          type: string
          description: Project name (also serves as a database namespace)
          example: "my_project"
      example:
        name: "mindsdb"

    # =========================================================================
    # Model Schemas
    # =========================================================================
    ModelCreate:
      type: object
      description: Model training request
      properties:
        name:
          type: string
          description: Name for the new model
          example: "price_predictor"
        predict:
          type: string
          description: Target column to predict
          example: "price"
        query:
          type: string
          description: SQL query to fetch training data
          example: "SELECT * FROM my_postgres.sales_data"
        engine:
          type: string
          description: |
            ML engine to use. Common options:
            - `lightwood` - AutoML (default)
            - `openai` - OpenAI GPT models
            - `anthropic` - Anthropic Claude models
            - `huggingface` - HuggingFace transformers
          example: "lightwood"
        options:
          type: object
          description: Engine-specific training options
          additionalProperties: true
      required:
        - name
        - predict
        - query
      example:
        name: "house_price_model"
        predict: "price"
        query: "SELECT bedrooms, sqft, location, price FROM real_estate.listings"
        engine: "lightwood"

    ModelInfo:
      type: object
      description: Model information
      properties:
        name:
          type: string
          description: Model name
        status:
          type: string
          description: Training status
          enum: [generating, training, complete, error]
        predict:
          type: string
          description: Target column being predicted
        engine:
          type: string
          description: ML engine used
        created_at:
          type: string
          format: date-time
          description: When the model was created
        training_time:
          type: number
          description: Training duration in seconds
        accuracy:
          type: number
          description: Model accuracy score (if applicable)
      example:
        name: "price_predictor"
        status: "complete"
        predict: "price"
        engine: "lightwood"
        created_at: "2024-01-15T10:30:00Z"
        training_time: 45.2
        accuracy: 0.94

    PredictionRequest:
      type: object
      description: Request for model predictions
      properties:
        data:
          oneOf:
            - type: string
              description: SQL query to fetch prediction input data
            - type: array
              description: Array of objects with input features
              items:
                type: object
      example:
        data: "SELECT * FROM my_postgres.new_listings WHERE price IS NULL"

    PredictionResponse:
      type: object
      description: Model prediction results
      properties:
        predictions:
          type: array
          items:
            type: object
            properties:
              prediction:
                description: Predicted value
              confidence:
                type: number
                description: Confidence score (0-1)
              explanation:
                type: object
                description: Feature importance and reasoning
      example:
        predictions:
          - prediction: 450000
            confidence: 0.87
            explanation:
              sqft: 0.45
              location: 0.35
              bedrooms: 0.20

    # =========================================================================
    # Agent Schemas
    # =========================================================================
    AgentCreate:
      type: object
      description: Agent creation request
      properties:
        name:
          type: string
          description: Agent name
          example: "sales_assistant"
        model:
          type: string
          description: LLM model to use (e.g., gpt-4, claude-3)
          example: "gpt-4"
        knowledge_bases:
          type: array
          description: Knowledge bases the agent can access
          items:
            type: string
          example: ["product_docs", "faq"]
        skills:
          type: array
          description: Skills/tools the agent can use
          items:
            type: string
          example: ["sql_query", "web_search"]
        prompt_template:
          type: string
          description: System prompt template for the agent
          example: "You are a helpful sales assistant..."
      required:
        - name
        - model

    AgentCompletion:
      type: object
      description: Agent completion request
      properties:
        message:
          type: string
          description: User message to the agent
          example: "What are our top-selling products?"
        context:
          type: object
          description: Additional context for the conversation
          additionalProperties: true
        stream:
          type: boolean
          description: Enable SSE streaming for real-time responses
          default: false
      required:
        - message

    # =========================================================================
    # Knowledge Base Schemas
    # =========================================================================
    KnowledgeBaseCreate:
      type: object
      description: Knowledge base creation request
      properties:
        name:
          type: string
          description: Knowledge base name
          example: "product_documentation"
        model:
          type: string
          description: Embedding model for vectorization
          example: "text-embedding-3-small"
        storage:
          type: string
          description: Vector storage backend (chromadb, pgvector)
          default: "chromadb"
      required:
        - name

    # =========================================================================
    # View Schemas
    # =========================================================================
    ViewCreate:
      type: object
      description: View (saved query) creation request
      properties:
        name:
          type: string
          description: View name
          example: "monthly_sales_summary"
        query:
          type: string
          description: SQL query that defines the view
          example: "SELECT month, SUM(amount) as total FROM sales GROUP BY month"
      required:
        - name
        - query
      example:
        name: "active_customers"
        query: "SELECT * FROM my_postgres.customers WHERE status = 'active'"

    ViewInfo:
      type: object
      description: View information
      properties:
        name:
          type: string
          description: View name
        query:
          type: string
          description: SQL query that defines the view
        created_at:
          type: string
          format: date-time
          description: When the view was created
      example:
        name: "monthly_sales_summary"
        query: "SELECT month, SUM(amount) as total FROM sales GROUP BY month"
        created_at: "2024-01-15T10:30:00Z"

    # =========================================================================
    # Job Schemas
    # =========================================================================
    JobCreate:
      type: object
      description: Scheduled job creation request
      properties:
        name:
          type: string
          description: Job name
          example: "daily_model_retrain"
        query:
          type: string
          description: SQL query to execute on schedule
          example: "RETRAIN my_model"
        schedule:
          type: string
          description: Cron schedule expression
          example: "0 2 * * *"
        start_at:
          type: string
          format: date-time
          description: When to start running the job
      required:
        - name
        - query
        - schedule

    # =========================================================================
    # SQL Query Schemas
    # =========================================================================
    SQLQueryRequest:
      type: object
      description: SQL query execution request
      properties:
        query:
          type: string
          description: |
            SQL query to execute. Supports full Kore SQL dialect:

            **Data Definition:**
            - `CREATE DATABASE name` - Create project
            - `CREATE DATABASE name WITH ENGINE='type'...` - Connect datasource
            - `CREATE MODEL name...` - Train model
            - `CREATE VIEW name AS SELECT...` - Create view
            - `DROP DATABASE/MODEL/VIEW name` - Delete resource

            **Data Query:**
            - `SELECT * FROM model WHERE...` - Make predictions
            - `SELECT * FROM database.table` - Query external data
            - `SHOW DATABASES/MODELS/TABLES` - List resources
            - `DESCRIBE model` - Get model details

            **Model Operations:**
            - `RETRAIN model` - Retrain existing model
            - `FINETUNE model FROM...` - Fine-tune with new data
          example: "SHOW DATABASES"
      required:
        - query
      example:
        query: "SELECT * FROM my_model WHERE category = 'electronics'"

    SQLQueryResponse:
      type: object
      description: SQL query execution response
      properties:
        column_names:
          type: array
          description: Column names in the result set
          items:
            type: string
          example: ["id", "name", "prediction", "confidence"]
        data:
          type: array
          description: Result rows
          items:
            type: array
          example:
            - [1, "Product A", 150.00, 0.92]
            - [2, "Product B", 200.00, 0.88]
        type:
          type: string
          description: Response type (table, ok, error)
          enum: [table, ok, error]

security:
  - ApiKeyAuth: []

paths:
  # ===========================================================================
  # HEALTH ENDPOINTS
  # ===========================================================================
  /util/ping:
    get:
      tags:
        - Health
      summary: Health check
      description: |
        Verify the Kore service is running and responsive.

        Returns a simple status message to confirm the service is alive.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
              example:
                status: "ok"
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /config:
    get:
      tags:
        - Health
      summary: Get service configuration
      description: |
        Retrieve the current Kore service configuration.

        Useful for debugging and understanding the service setup.
      operationId: getConfig
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized - invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===========================================================================
  # DATABASE ENDPOINTS
  # ===========================================================================
  /databases:
    get:
      tags:
        - Databases
      summary: List all database connections
      description: |
        Retrieve a list of all connected databases (datasources).

        **Note**: Databases are global in Kore - they are not scoped to projects.
        All projects can access all connected databases.

        ### Example Response
        ```json
        [
          {
            "name": "my_postgres",
            "engine": "postgres",
            "tables": ["users", "orders", "products"]
          },
          {
            "name": "mongo_logs",
            "engine": "mongodb",
            "tables": ["events", "errors"]
          }
        ]
        ```
      operationId: listDatabases
      responses:
        '200':
          description: List of database connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatabaseInfo'
              example:
                - name: "production_postgres"
                  engine: "postgres"
                  tables: ["users", "orders"]
                - name: "analytics_mongo"
                  engine: "mongodb"
                  tables: ["events"]
        '401':
          description: Unauthorized - invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Databases
      summary: Create a database connection
      description: |
        Connect a new external database (datasource) to Kore.

        Once connected, you can query data from this database and use it for model training.

        ### Supported Engines

        | Engine | Description |
        |--------|-------------|
        | `postgres` | PostgreSQL |
        | `mysql` | MySQL / MariaDB |
        | `mongodb` | MongoDB |
        | `snowflake` | Snowflake Data Warehouse |
        | `bigquery` | Google BigQuery |
        | `s3` | Amazon S3 (files) |
        | `elasticsearch` | Elasticsearch |
        | `redis` | Redis |

        ### Example Request
        ```json
        {
          "name": "my_postgres",
          "engine": "postgres",
          "connection_data": {
            "host": "db.example.com",
            "port": 5432,
            "database": "production",
            "user": "analyst",
            "password": "secret123"
          }
        }
        ```

        ### SQL Equivalent
        ```sql
        CREATE DATABASE my_postgres
        WITH ENGINE = 'postgres',
        PARAMETERS = {
          "host": "db.example.com",
          "port": 5432,
          "database": "production",
          "user": "analyst",
          "password": "secret123"
        };
        ```
      operationId: createDatabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatabaseConnection'
            example:
              name: "my_postgres"
              engine: "postgres"
              connection_data:
                host: "db.example.com"
                port: 5432
                database: "production"
                user: "analyst"
                password: "secret123"
      responses:
        '201':
          description: Database connection created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                status: "ok"
                message: "Database 'my_postgres' created successfully"
        '400':
          description: Invalid request - missing required fields or invalid engine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "validation_error"
                message: "Field 'engine' is required"
        '401':
          description: Unauthorized - invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - database with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "conflict"
                message: "Database 'my_postgres' already exists"
        '500':
          description: Server error - connection test may have failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Databases
      summary: Update a database connection
      description: |
        Update an existing database connection's configuration.

        Use this to change connection parameters like host, port, credentials, etc.

        ### Example Request
        ```json
        {
          "name": "my_postgres",
          "connection_data": {
            "host": "new-db.example.com",
            "password": "new_password"
          }
        }
        ```
      operationId: updateDatabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the database to update
                connection_data:
                  type: object
                  description: Updated connection parameters
              required:
                - name
      responses:
        '200':
          description: Database connection updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Database not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  '/databases/{databaseName}':
    get:
      tags:
        - Databases
      summary: Get database details
      description: |
        Retrieve detailed information about a specific database connection.

        Returns the database configuration, available tables, and connection status.

        ### Example Response
        ```json
        {
          "name": "my_postgres",
          "engine": "postgres",
          "tables": ["users", "orders", "products", "inventory"],
          "connection_data": {
            "host": "db.example.com",
            "port": 5432,
            "database": "production",
            "user": "analyst",
            "password": "********"
          }
        }
        ```
      operationId: getDatabase
      parameters:
        - name: databaseName
          in: path
          description: Name of the database connection
          required: true
          schema:
            type: string
          example: "my_postgres"
      responses:
        '200':
          description: Database information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Database not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "not_found"
                message: "Database 'my_postgres' not found"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Databases
      summary: Delete a database connection
      description: |
        Remove a database connection from Kore.

        **Warning**: This does not delete the actual database - it only removes
        the connection from Kore. Models trained on data from this database
        will continue to work but cannot be retrained.

        ### SQL Equivalent
        ```sql
        DROP DATABASE my_postgres;
        ```
      operationId: deleteDatabase
      parameters:
        - name: databaseName
          in: path
          description: Name of the database connection to delete
          required: true
          schema:
            type: string
          example: "my_postgres"
      responses:
        '200':
          description: Database connection deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                status: "ok"
                message: "Database 'my_postgres' deleted successfully"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Database not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===========================================================================
  # PROJECT ENDPOINTS
  # ===========================================================================
  /projects:
    get:
      tags:
        - Projects
      summary: List all projects
      description: |
        Retrieve a list of all projects in Kore.

        The default project is `mindsdb`. Each project is an isolated namespace
        for models, agents, knowledge bases, and other resources.

        ### Creating Projects
        Projects cannot be created via REST API. Use SQL instead:
        ```sql
        CREATE DATABASE my_new_project;
        ```

        ### Example Response
        ```json
        [
          {"name": "mindsdb"},
          {"name": "sales_analytics"},
          {"name": "customer_support"}
        ]
